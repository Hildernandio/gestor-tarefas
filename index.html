<div style="margin-bottom:10px; font-size:11px; font-weight:700; color:var(--text3); letter-spacing: 0.5px;">MATRIZ DE EISENHOWER COMPLETA</div>
<div class="ei-grid" style="grid-template-columns: 1fr 1fr; display: grid; gap: 10px;">
  <div class="quad q1"><div class="qh"><div class="qbadge" style="background:var(--red-bg); color:var(--red);">Q1</div><span style="font-size:12px; font-weight:600;">Fazer Agora</span></div><div id="e1"></div></div>
  
  <div class="quad q2"><div class="qh"><div class="qbadge" style="background:var(--blue-bg); color:var(--blue);">Q2</div><span style="font-size:12px; font-weight:600;">Agendar</span></div><div id="e2"></div></div>
  
  <div class="quad q3" style="background:var(--surface); border:1px solid var(--border); border-radius:var(--rl); min-height:150px;">
    <div class="qh" style="padding:12px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:10px;">
      <div class="qbadge" style="background:var(--amber-bg); color:var(--amber); width:24px; height:24px; border-radius:6px; display:flex; align-items:center; justify-content:center; font-size:10px; font-weight:bold;">Q3</div>
      <span style="font-size:12px; font-weight:600;">Delegar</span>
    </div>
    <div id="e3"></div>
  </div>
  
  <div class="quad q4" style="background:var(--surface); border:1px solid var(--border); border-radius:var(--rl); min-height:150px;">
    <div class="qh" style="padding:12px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:10px;">
      <div class="qbadge" style="background:var(--surface2); color:var(--text3); width:24px; height:24px; border-radius:6px; display:flex; align-items:center; justify-content:center; font-size:10px; font-weight:bold;">Q4</div>
      <span style="font-size:12px; font-weight:600;">Eliminar</span>
    </div>
    <div id="e4"></div>
  </div>
</div>

<script>
// Atualize a função render para distribuir nos 4 quadrantes
function render() {
    const hoje = tds();
    const cont = { cl:[], ch:[], cs:[], cf:[], e1:[], e2:[], e3:[], e4:[] };
    
    tasks.forEach(t => {
        if(t.done) return;
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
            <div class="ctit">${t.title}</div>
            <div style="display:flex; align-items:center; gap:5px;">
                <span class="tag ${t.priority || 'media'}">${t.priority || 'média'}</span>
                <span style="font-size:9px; color:var(--text3);">📅 ${t.date ? t.date.split('-').reverse().slice(0,2).join('/') : 'S/D'}</span>
                <button onclick="marcarFeito(${t.id})" style="margin-left:auto; cursor:pointer; border:none; background:none;">✓</button>
            </div>`;

        // Lógica Kanban (Mantida)
        if(!t.date) cont.cf.push(card);
        else if(t.date < hoje) cont.cl.push(card);
        else if(t.date === hoje) cont.ch.push(card);
        else cont.cs.push(card);

        // Lógica da Matriz Corrigida
        const qKey = t.quad ? t.quad.toLowerCase() : 'e2';
        if (cont[qKey]) cont[qKey].push(card.cloneNode(true));
        else cont.e2.push(card.cloneNode(true));
    });

    for(let id in cont) {
        const el = document.getElementById(id);
        if(el) {
            el.innerHTML = '';
            cont[id].forEach(c => el.appendChild(c));
        }
    }
    atualizarStats();
}
</script>
